[pytest]
# The suite is black-box HTTP checks against a running server (see
# __tests__/conftest.py). We keep the repo-wide Jest-style __tests__/<name>.test.py
# layout, so teach pytest to discover *.test.py alongside the usual test_*.py.
testpaths = __tests__
python_files = *.test.py test_*.py
python_functions = test_*
addopts = -v --import-mode=importlib
